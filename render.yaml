services:
  - type: web
    name: tempshare-socket
    runtime: node
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SOCKET_SERVER_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
